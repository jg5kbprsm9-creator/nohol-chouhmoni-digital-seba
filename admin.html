<!DOCTYPE html>
<html lang="bn">
<head><style>
body{
  font-family: Arial;
  background:#f4f6f9;
  margin:0;
  padding:20px;
}

h2{
  text-align:center;
  color:#0077ff;
}

.card{
  background:white;
  padding:15px;
  margin:10px;
  border-radius:10px;
  box-shadow:0px 2px 8px rgba(0,0,0,0.1);
}

button{
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:first-of-type{
  background:green;
  color:white;
}

button:last-of-type{
  background:red;
  color:white;
}
</style>
<meta charset="UTF-8">
<title>Admin Panel</title>
</head>
<body>

<h2>Admin Panel - Reports</h2>

<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCzTdBAwkALVSlJ1F8wHRRtWftNML6_VVs",
  authDomain: "nohol-digital-seba-5c4c4.firebaseapp.com",
  projectId: "nohol-digital-seba-5c4c4",
  storageBucket: "nohol-digital-seba-5c4c4.firebasestorage.app",
  messagingSenderId: "777176375683",
  appId: "1:777176375683:web:37598a8e9e3619680416b6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function loadReports(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  db.collection("reports").get().then((snapshot) => {
    snapshot.forEach((doc) => {
      let data = doc.data();

      list.innerHTML += `
        <div style="border:1px solid #000; padding:10px; margin:10px;">
          <h3>${data.title}</h3>
          <p>${data.description}</p>
          <p>Status: ${data.status}</p>

          <button onclick="approve('${doc.id}')">Approve</button>
          <button onclick="reject('${doc.id}')">Reject</button>
        </div>
      `;
    });
  });
}

function approve(id){
  db.collection("reports").doc(id).update({status:"approved"});
  loadReports();
}

function reject(id){
  db.collection("reports").doc(id).update({status:"rejected"});
  loadReports();
}

loadReports();
</script>

</body>
</html>
