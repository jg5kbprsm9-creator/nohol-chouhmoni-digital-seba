<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>নহল চৌহমুনি ডিজিটাল সেবা</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: #f2f6ff;
}

header{
  background: linear-gradient(90deg,#0f9b0f,#00c853);
  color:white;
  padding:30px;
  text-align:center;
}

.card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
  background:#00c853;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  width:100%;
  font-size:16px;
}

button:hover{
  background:#009624;
}
</style>

</head>

<body>

<header>
  <h1>নহল চৌহমুনি ডিজিটাল সেবা</h1>
  <p>একটি নিরাপদ ও সচেতন সমাজ গঠনের উদ্যোগ</p>
</header>

<div class="card">
  <h3>🚨 জরুরি সেবা</h3>
  <p>পুলিশ: 999</p>
  <p>ফায়ার সার্ভিস: 199</p>
  <p>অ্যাম্বুলেন্স: 199</p>
</div>

<div class="card">
  <h3>📝 সমস্যা রিপোর্ট করুন</h3>
  <p>মাদক, দুর্নীতি বা অন্য সমস্যা জানান</p>
  <button>রিপোর্ট করুন</button>
</div>

<div class="card">
  <h3>📢 সচেতনতা</h3>
  <p>মাদক মুক্ত সমাজ গড়তে সবাইকে এগিয়ে আসতে হবে</p>
</div>

</body>
</html>
