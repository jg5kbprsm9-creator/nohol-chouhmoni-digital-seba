<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>নহল চৌহমুনি ডিজিটাল সেবা</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family: 'Noto Sans Bengali', sans-serif;
  margin:0;
  background:#f5f7fb;
}

/* HERO */
.hero{
  background: linear-gradient(135deg,#0066ff,#00c6ff);
  color:white;
  text-align:center;
  padding:50px 15px;
  border-radius:0 0 25px 25px;
}

/* MENU */
.menu{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:white;
  position:sticky;
  top:0;
}

.menu a{
  text-decoration:none;
  padding:8px 14px;
  border-radius:20px;
  color:#0066ff;
  font-weight:600;
  background:#eef5ff;
  transition:0.3s;
}

.menu a:hover{
  background:#0066ff;
  color:white;
}

/* CONTAINER */
.container{
  padding:15px;
  display:grid;
  gap:15px;
}

/* CARD */
.card{
  background:white;
  padding:18px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* BUTTON */
button{
  background:#0066ff;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#004bb5;
  transform:scale(1.05);
}

/* FORM */
#formBox{
  display:none;
  background:white;
  padding:15px;
  margin:15px;
  border-radius:10px;
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>নহল চৌহমুনি ডিজিটাল সেবা</h1>
  <p>গ্রামের সকল তথ্য, অভিযোগ ও জরুরি সেবা এক জায়গায়</p>
</div>

<!-- MENU -->
<div class="menu">
  <a href="index.html">হোম</a>
  <a href="emergency.html">জরুরি সেবা</a>
  <a href="admin.html">এডমিন</a>
</div>

<!-- CONTENT -->
<div class="container">

<div class="card">
  <h2>📢 অভিযোগ করুন</h2>
  <p>গ্রামের যেকোনো সমস্যা রিপোর্ট করুন</p>
  <button onclick="document.getElementById('formBox').style.display='block'">
    শুরু করুন
  </button>
</div>

<div class="card">
  <h2>🚨 জরুরি সেবা</h2>
  <p>পুলিশ, ফায়ার সার্ভিস, হাসপাতাল তথ্য</p>
  <a href="emergency.html"><button>দেখুন</button></a>
</div>

<div class="card">
  <h2>📰 ঘোষণা</h2>
  <div id="notices">লোড হচ্ছে...</div>
</div>

</div>

<!-- FORM -->
<div id="formBox">
  <h3>রিপোর্ট করুন</h3>
  <input id="title" placeholder="সমস্যা লিখুন" style="width:100%;padding:8px;">
  <br><br>
  <textarea id="desc" placeholder="বিস্তারিত লিখুন" style="width:100%;padding:8px;"></textarea>
  <br><br>
  <button onclick="submitReport()">সাবমিট</button>
</div>

</body>
</html>
